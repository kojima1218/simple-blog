services:
  db:
    image: mysql:8.0
    container_name: simple-blog-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: simple_blog
      MYSQL_USER: app
      MYSQL_PASSWORD: apppass
      MYSQL_ROOT_PASSWORD: rootpass
      TZ: Asia/Tokyo
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
